name: Python CI Pipeline

# ============================================
# Triggers
# ============================================
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# ============================================
# Jobs
# ============================================
jobs:

  ci-pipeline:

    # Runner Machine
    runs-on: ubuntu-latest

    # Steps executed inside runner
    steps:

      # Step 1 - Download repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Step 3 - Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Step 4 - Black Formatting Check
      - name: Black Check
        run: |
          python -m black --check app/ tests/

      # Step 5 - isort Check
      - name: isort Check
        run: |
          python -m isort --check-only app/ tests/

      # Step 6 - Flake8 Lint
      - name: Flake8 Lint
        run: |
          python -m flake8 app/ tests/

      # Step 7 - MyPy Type Check
      - name: MyPy Type Check
        run: |
          python -m mypy app/

      # Step 8 - Pytest
      - name: Run Unit Tests
        run: |
          python -m pytest tests/ -v

      # Step 9 - Coverage
      - name: Coverage Check
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

      # Step 10 - Bandit Security Scan
      - name: Bandit Security Scan
        run: |
          python -m bandit -r app/ -ll

      # Step 11 - pip-audit
      - name: Dependency Vulnerability Scan
        run: |
          python -m pip_audit

      # Step 12 - Build Validation
      - name: Package Build Validation
        run: |
          python -m build


      # ============================================
      # Docker Buildx Setup
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================
      # Login to DockerHub
      # ============================================
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============================================
      # Build and Push Docker Image
      # ============================================
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: chhrainsdhui/python-cicd-demo:latest
          